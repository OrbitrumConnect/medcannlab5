name: Deploy Edge Functions & Run Integration Tests

# Motivação: até 24/04/2026 o deploy da Edge Function tradevision-core era
# manual — cada fix precisava ser deployado à mão no dashboard Supabase, o que
# fez vários commits ficarem "em prod" só no repo, não no runtime. Este workflow
# automatiza:
#   1) Deploy da Edge Function tradevision-core em cada push a main/master
#   2) Execução dos 3 testes de integração críticos após o deploy
#      (consent gate, monetization e2e, aec finalize schema)
#
# Segredos necessários em Settings → Secrets:
#   SUPABASE_ACCESS_TOKEN         — PAT pessoal (sbp_...)
#   SUPABASE_PROJECT_REF          — itdjkfubfzmvmuxxjoae (pode ser var também)
#   SUPABASE_URL                  — https://itdjkfubfzmvmuxxjoae.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY     — service_role key (só pros testes)

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/tradevision-core/**'
      - 'supabase/functions/_shared/**'
      - 'supabase/migrations/**'              # V1.9.50: RLS audit roda em mudanças de schema
      - 'tests/integration/**'
      - 'scripts/audit_rls_gate.*'            # V1.9.50: roda quando o próprio audit muda
      - '.github/workflows/deploy-and-test.yml'
  workflow_dispatch: # permite deploy manual sob demanda pela UI do GitHub

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # fila — não cancelar mid-deploy, pode deixar staging quebrado

jobs:
  rls-audit:
    # V1.9.50 — RLS Audit Gate. Roda scripts/audit_rls_gate.sql via Management API
    # antes do deploy. Contrato de exit do script:
    #   - FAIL > 0 → process.exit(1) → job falha → deploy NÃO roda
    #   - WARN qualquer quantidade → process.exit(0) → não bloqueia
    #   - OK_INFO → silencioso estruturado, não influencia pipeline
    # Falso positivo de 25/04 (afirmamos "26 views sem RLS" baseado em query
    # errada) gerou esta classe de garantia automatizada.
    name: RLS audit gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run RLS audit
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/audit_rls_gate.js

  deploy:
    name: Deploy tradevision-core
    runs-on: ubuntu-latest
    needs: rls-audit
    # Hard guarantee: deploy só roda se rls-audit completou com sucesso.
    # `needs.X.result` é variável built-in do GitHub Actions (sempre populada
    # corretamente quando job termina). Mais robusto que output customizado.
    if: needs.rls-audit.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # [V1.9.59 S4 cirúrgico] Removido --no-verify-jwt. Supabase gateway agora
        # valida JWT antes da request chegar ao Edge Function. Requests sem
        # Authorization válido recebem 401 do gateway, não chegam ao código.
        # Trust boundary fechado.
        run: |
          supabase functions deploy tradevision-core \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  integration-tests:
    name: Integration tests (consent, monetization, schema)
    runs-on: ubuntu-latest
    needs: deploy
    # Hard guarantee: integration tests só rodam se deploy completou com sucesso.
    if: needs.deploy.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:integration
