name: Deploy video-call-reminders Edge Function

# V1.9.99 (28/04/2026) — workflow dedicado pra deploy de video-call-reminders.
# Padrão escalável: cada Edge crítica tem seu próprio workflow (em vez de
# inflar o deploy-and-test.yml original do tradevision-core).
#
# Dispara em push que toque:
#   - supabase/functions/video-call-reminders/**
#   - supabase/functions/_shared/**
#
# Segredos (já presentes no repo):
#   SUPABASE_ACCESS_TOKEN  — PAT pessoal
#   SUPABASE_PROJECT_REF   — itdjkfubfzmvmuxxjoae

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/video-call-reminders/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-video-call-reminders.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy video-call-reminders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy video-call-reminders \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
