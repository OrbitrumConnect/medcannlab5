  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      // Desabilitar Service Worker em desenvolvimento para evitar conflitos com HMR
      // Verificar se está em desenvolvimento (localhost ou 127.0.0.1)
      const isDevelopment = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' ||
                            window.location.hostname.includes('localhost')
      
      if ('serviceWorker' in navigator) {
        if (isDevelopment) {
          // Em desenvolvimento, desregistrar qualquer Service Worker existente
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => {
              registration.unregister().then(() => {
                console.log('🔧 Service Worker desregistrado em desenvolvimento (evita conflitos com HMR)')
              })
            })
          })
        } else {
          // Em produção, registrar o Service Worker
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then((registration) => {
                console.log('✅ Service Worker registrado:', registration.scope)
                
                // Verificar atualizações periodicamente
                setInterval(() => {
                  registration.update()
                }, 60000) // A cada 1 minuto
                
                // Forçar atualização imediata se houver nova versão
                registration.addEventListener('updatefound', () => {
                  const newWorker = registration.installing
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // Nova versão disponível, recarregar página
                      console.log('🔄 Nova versão do Service Worker disponível, recarregando...')
                      window.location.reload()
                    }
                  })
                })
              })
              .catch((error) => {
                console.warn('⚠️ Erro ao registrar Service Worker:', error)
              })
          })
        }
      }
    </script>
  </body>
</html>
